name: Device CI Proxy

on:
  workflow_call:
    inputs:
      workflow_file:
        required: true
        type: string
      device:
        required: true
        type: string
      api_level:
        required: true
        type: string
      record_video:
        required: true
        type: boolean
      docker_tag:
        required: true
        type: string

concurrency:
  group: device-ci-proxy-${{ inputs.device }}-${{ inputs.api_level }}-${{ inputs.record_video }}
  cancel-in-progress: true

jobs:
  setup-node-and-trigger-device-ci:
    runs-on: ubuntu-latest
    outputs:
      ws_endpoint: ${{ steps.export_tunnel.outputs.ws }}
      ipfs_gateway: ${{ steps.export_ipfs_tunnels.outputs.ipfs_gateway }}
      ipfs_auth_gateway: ${{ steps.export_ipfs_tunnels.outputs.ipfs_auth_gateway }}

    steps:
      - uses: actions/checkout@v6

      - name: Run encointer-node
        run: |
          ./scripts/docker_run_encointer_node_notee.sh ${{ inputs.docker_tag }} &

      - name: Bootstrap demo community
        run: |
          ./scripts/docker_run_encointer_client_bootstrap_demo_community.sh \
            --docker-tag=${{ inputs.docker_tag }}

      - name: Run IPFS node (kubo)
        run: |
          docker run -d --name kubo --network=host \
            -e IPFS_PROFILE=server \
            ipfs/kubo:latest
          for i in $(seq 1 30); do
            curl -s http://localhost:5001/api/v0/id && break
            sleep 1
          done

      - name: Run IPFS auth gateway
        run: |
          docker run -d --name ipfs-gateway --network=host \
            -e PORT=5050 \
            -e JWT_SECRET=ci-test-secret \
            -e IPFS_API_URL=http://localhost:5001 \
            -e CHAIN_RPC_URL=ws://localhost:9944 \
            -e MIN_BALANCE_CC=0.001 \
            encointer/ipfs-gateway
          sleep 3
          curl -s http://localhost:5050/health || echo "Gateway health check (may not have /health)"

      - name: Start Cloudflare tunnel
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --url http://localhost:9944 > tunnel.log 2>&1 &

          echo "Waiting for WS tunnel URL (up to 60s)..."
          for i in $(seq 1 60); do
            WS_URL=$(grep -o 'https://[^ ]*trycloudflare.com' tunnel.log 2>/dev/null | head -n1 || true)
            if [ -n "$WS_URL" ]; then
              echo "WS tunnel ready after ${i}s: $WS_URL"
              break
            fi
            sleep 1
          done

          if [ -z "$WS_URL" ]; then
            echo "::error::WS tunnel not ready after 60s"
            cat tunnel.log
            exit 1
          fi

      - name: Verify Cloudflare tunnel health
        run: ./scripts/check_cloudflare_tunnel.sh

      - id: export_tunnel
        name: Export WS endpoint
        run: |
          HTTP_URL=$(grep -o 'https://[^ ]*trycloudflare.com' tunnel.log | head -n1)
          WS_URL="${HTTP_URL/https:/wss:}"

          echo "🔌 Exporting WS endpoint: $WS_URL"
          echo "ws=$WS_URL" >> "$GITHUB_OUTPUT"

      - name: Start IPFS tunnels
        run: |
          ./cloudflared tunnel --url http://localhost:8080 > ipfs_tunnel.log 2>&1 &
          ./cloudflared tunnel --url http://localhost:5050 > ipfs_auth_tunnel.log 2>&1 &

          echo "Waiting for IPFS tunnel URLs (up to 60s)..."
          for i in $(seq 1 60); do
            IPFS_GW=$(grep -o 'https://[^ ]*trycloudflare.com' ipfs_tunnel.log 2>/dev/null | head -n1 || true)
            IPFS_AUTH=$(grep -o 'https://[^ ]*trycloudflare.com' ipfs_auth_tunnel.log 2>/dev/null | head -n1 || true)
            if [ -n "$IPFS_GW" ] && [ -n "$IPFS_AUTH" ]; then
              echo "Both IPFS tunnels ready after ${i}s"
              break
            fi
            sleep 1
          done

          if [ -z "$IPFS_GW" ] || [ -z "$IPFS_AUTH" ]; then
            echo "::warning::IPFS tunnel(s) not ready after 60s (gateway=$IPFS_GW, auth=$IPFS_AUTH)"
          fi

      - id: export_ipfs_tunnels
        name: Export IPFS endpoints
        run: |
          IPFS_GW=$(grep -o 'https://[^ ]*trycloudflare.com' ipfs_tunnel.log | head -n1)
          IPFS_AUTH=$(grep -o 'https://[^ ]*trycloudflare.com' ipfs_auth_tunnel.log | head -n1)
          echo "ipfs_gateway=$IPFS_GW" >> "$GITHUB_OUTPUT"
          echo "ipfs_auth_gateway=$IPFS_AUTH" >> "$GITHUB_OUTPUT"

      - name: Trigger Device CI
        id: trigger_device
        env:
          WS_ENDPOINT: ${{ steps.export_tunnel.outputs.ws }}
          IPFS_GATEWAY: ${{ steps.export_ipfs_tunnels.outputs.ipfs_gateway }}
          IPFS_AUTH_GATEWAY: ${{ steps.export_ipfs_tunnels.outputs.ipfs_auth_gateway }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/trigger_device_ci.sh \
            "${{ inputs.device }}" \
            "${{ inputs.api_level }}" \
            "${{ inputs.record_video }}" \
            "${{ inputs.workflow_file }}" \
            "$WS_ENDPOINT" \

      # Todo: Ideally, we should cancel this job after the CI is done, but GitHub Actions does not
      # Support cancelling on a job-level (only workflow-level).
      - name: Keep tunnel alive and check every 30s
        run: |
          echo "⏳ Monitoring Cloudflare tunnel for up to 45 minutes..."
          MAX_MINUTES=55
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $((MAX_MINUTES * 60)) ]; do
            if ./scripts/check_cloudflare_tunnel.sh; then
              echo "✅ Tunnel is healthy (checked at $ELAPSED seconds)"
            else
              echo "⚠️ Tunnel check failed at $ELAPSED seconds"
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "⏰ Finished 60 minutes monitoring."
