name: iOS Device CI
run-name: iOS Device CI (${{ github.event.inputs.device }})

on:
  workflow_dispatch:
    inputs:
      device:
        description:  "Device"
        required: true
        type: string
      api_level:
        description: "API Level"
        required: true
        type: number
      record_video:
        description: "Record Video"
        required: true
        type: boolean
      ws_endpoint:
        description: "WebSocket Endpoint"
        required: true
        type: string
      git_ref:
        description: "For concurrency management"
        required: true
        type: string
      ipfs_gateway:
        description: "IPFS Gateway URL"
        required: false
        type: string
      ipfs_auth_gateway:
        description: "IPFS Auth Gateway URL"
        required: false
        type: string

env:
  ARTIFACT_PATH: ./screenshots

concurrency:
  group: device-ci-${{ github.event.inputs.git_ref }}-${{ github.event.inputs.device }}-${{ github.event.inputs.api_level }}-${{ github.event.inputs.record_video }}
  cancel-in-progress: true

jobs:
  ios_device_tests:
    name: iOS Device Tests
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      # Setup Environment
      - uses: actions/checkout@v6

      - name: Set unified input variables
        run: |
          echo "DEVICE=${{ github.event.inputs.device }}" >> $GITHUB_ENV
          echo "API_LEVEL=${{ github.event.inputs.api_level }}" >> $GITHUB_ENV
          echo "RECORD_VIDEO=${{ github.event.inputs.record_video }}" >> $GITHUB_ENV
          echo "WS_ENDPOINT=${{ github.event.inputs.ws_endpoint }}" >> $GITHUB_ENV
          echo "IPFS_GATEWAY=${{ github.event.inputs.ipfs_gateway }}" >> $GITHUB_ENV
          echo "IPFS_AUTH_GATEWAY=${{ github.event.inputs.ipfs_auth_gateway }}" >> $GITHUB_ENV

      - name: Set Env Vars
        run: cat .github/env >> $GITHUB_ENV

      - name: Debug WS endpoint
        shell: bash
        run: |
          set -euo pipefail
          
          echo "WS_ENDPOINT=$WS_ENDPOINT"
          [[ -n "$WS_ENDPOINT" ]] || (echo "❌ WS_ENDPOINT is empty" && exit 1)
          
          # Convert WS → HTTP for health check
          HTTP_URL="${WS_ENDPOINT/wss:/https:}"
          
          echo "🌍 HTTP endpoint: $HTTP_URL"
          echo "🔎 Performing JSON-RPC health check..."
          
          JSON_PAYLOAD='{"jsonrpc":"2.0","id":1,"method":"system_health","params":[]}'
          
          RESPONSE=$(curl -sS \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            "$HTTP_URL" || true)
          
          echo "↩️ Raw response:"
          echo "$RESPONSE"
          
          # Validate JSON-RPC success
          echo "$RESPONSE" | jq -e '.result' >/dev/null
          
          echo "✅ JSON-RPC health check passed"

      - name: Debug IPFS endpoints
        if: env.IPFS_GATEWAY != ''
        shell: bash
        run: |
          set -uo pipefail
          echo "📦 IPFS Gateway: $IPFS_GATEWAY"
          echo "🔐 IPFS Auth Gateway: $IPFS_AUTH_GATEWAY"

          for label_url in "IPFS_GW:$IPFS_GATEWAY" "IPFS_AUTH:$IPFS_AUTH_GATEWAY"; do
            LABEL="${label_url%%:*}"
            URL="${label_url#*:}"
            [ -z "$URL" ] && continue
            STATUS=$(curl -sS --max-time 10 -o /dev/null -w '%{http_code}' "$URL" || echo "000")
            echo "$LABEL → HTTP $STATUS"
            if [ "$STATUS" = "000" ]; then
              echo "::warning::$LABEL tunnel unreachable"
            fi
          done

      - name: prepare xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_TEST_VERSION }}

      - name: "Prepare environment for ios"
        working-directory: ./scripts
        run: ./ios_init_env.sh

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Install flutter wrapper
        run: ./scripts/install_flutter_wrapper.sh

        # Currently not needed. Used for potential future reference.
#      - name: "Create Simulator if iPad Pro 2nd gen"
#        if: ${{ env.DEVICE == 'iPad Pro (12.9-inch) (2nd generation)' }}
#        run: |
#          xcrun simctl create "iPad Pro (12.9-inch) (2nd generation)" "com.apple.CoreSimulator.SimDeviceType.iPad-Pro--12-9-inch---2nd-generation-" "com.apple.CoreSimulator.SimRuntime.iOS-26-2"

      - name: Get dependencies (i.e., melos)
        run: .flutter/bin/dart pub get

      - name: Melos Bootstrap
        run: .flutter/bin/dart run melos bootstrap

      - name: Start simulator
        id: start-simulator
        timeout-minutes: 5
        working-directory: ./scripts
        env:
          DEVICE_ID: ${{ env.DEVICE }}
        run: source ./ios_emulator.sh

      - name: Start screen recording
        if: ${{ env.RECORD_VIDEO == 'true' && steps.start-simulator.conclusion == 'success' }}
        shell: bash
        run: |
          echo "Starting screen recording..."
          xcrun simctl io booted recordVideo --codec=h264 --mask=black recording.mov &
          echo $! > recording_pid.txt      

      - name: Run Flutter integration tests
        if: ${{ !cancelled() && steps.start-simulator.conclusion == 'success' }}
        working-directory: ./app
        timeout-minutes: 45
        shell: bash
        run: |
          echo "🚀 Running Flutter integration tests with WS_ENDPOINT=$WS_ENDPOINT"
          ../.flutter/bin/flutter drive \
            --no-enable-impeller \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_test.dart \
            --dart-define=WS_ENDPOINT="$WS_ENDPOINT" \
            --dart-define=locales=en

      - name: Run bazaar business story
        if: ${{ !cancelled() && steps.start-simulator.conclusion == 'success' && env.IPFS_GATEWAY != '' && env.IPFS_AUTH_GATEWAY != '' }}
        working-directory: ./app
        timeout-minutes: 20
        shell: bash
        run: |
          ../.flutter/bin/flutter drive \
            --no-enable-impeller \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/stories/bazaar_business_form_test.dart \
            --dart-define=WS_ENDPOINT="$WS_ENDPOINT" \
            --dart-define=IPFS_GATEWAY="$IPFS_GATEWAY" \
            --dart-define=IPFS_AUTH_GATEWAY="$IPFS_AUTH_GATEWAY" \
            --dart-define=locales=en

      - name: Stop recording and upload
        if: always()
        shell: bash
        run: |
          if [ -f recording_pid.txt ]; then
            RECORDING_PID=$(cat recording_pid.txt)
            echo "Stopping recording (pid $RECORDING_PID)..."
            kill -SIGINT $RECORDING_PID || echo "Recording process already stopped"
            sleep 5
          else
            echo "No recording in progress"
          fi
      
          mkdir -p "${{ env.ARTIFACT_PATH }}"
          cp recording.mov "${{ env.ARTIFACT_PATH }}" || echo "No recording found"
          cp -r "${{ env.ARTIFACT_PATH }}/test"/* "${{ env.ARTIFACT_PATH }}" || echo "No screenshots found"
          rm -r "${{ env.ARTIFACT_PATH }}/test" || true

      - name: Upload screenshots and recording
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DEVICE }}
          path: ${{ env.ARTIFACT_PATH }}
