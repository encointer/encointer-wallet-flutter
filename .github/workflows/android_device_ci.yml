name: Android CI
run-name: Android CI (${{ github.event.inputs.device }}, API ${{ github.event.inputs.api_level }})

on:
  workflow_dispatch:
    inputs:
      device:
        description:  "Device"
        required: true
        type: string
      api_level:
        description: "API Level"
        required: true
        type: number
      record_video:
        description: "Record Video"
        required: true
        type: boolean
      ws_endpoint:
        description: "WebSocket Endpoint"
        required: true
        type: string
      git_ref:
        description: "For concurrency management"
        required: true
        type: string
      ipfs_gateway:
        description: "IPFS Gateway URL"
        required: false
        type: string
      ipfs_auth_gateway:
        description: "IPFS Auth Gateway URL"
        required: false
        type: string

env:
  ARTIFACT_PATH: ./screenshots

concurrency:
  group: device-ci-${{ github.event.inputs.git_ref }}-${{ github.event.inputs.device }}-${{ github.event.inputs.api_level }}-${{ github.event.inputs.record_video }}
  cancel-in-progress: true

jobs:
  android_device_tests:
    name: Android Device Tests
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - uses: actions/checkout@v6

      - name: Set unified input variables
        run: |
          echo "DEVICE=${{ github.event.inputs.device }}" >> $GITHUB_ENV
          echo "API_LEVEL=${{ github.event.inputs.api_level }}" >> $GITHUB_ENV
          echo "RECORD_VIDEO=${{ github.event.inputs.record_video }}" >> $GITHUB_ENV
          echo "WS_ENDPOINT=${{ github.event.inputs.ws_endpoint }}" >> $GITHUB_ENV
          echo "IPFS_GATEWAY=${{ github.event.inputs.ipfs_gateway }}" >> $GITHUB_ENV
          echo "IPFS_AUTH_GATEWAY=${{ github.event.inputs.ipfs_auth_gateway }}" >> $GITHUB_ENV

      - name: Debug WS endpoint
        shell: bash
        run: |
          set -euo pipefail
          
          echo "WS_ENDPOINT=$WS_ENDPOINT"
          [[ -n "$WS_ENDPOINT" ]] || (echo "❌ WS_ENDPOINT is empty" && exit 1)
          
          # Convert WS → HTTP for health check
          HTTP_URL="${WS_ENDPOINT/wss:/https:}"
          
          echo "🌍 HTTP endpoint: $HTTP_URL"
          echo "🔎 Performing JSON-RPC health check..."
          
          JSON_PAYLOAD='{"jsonrpc":"2.0","id":1,"method":"system_health","params":[]}'
          
          RESPONSE=$(curl -sS \
            -H "Content-Type: application/json" \
            -d "$JSON_PAYLOAD" \
            "$HTTP_URL" || true)
          
          echo "↩️ Raw response:"
          echo "$RESPONSE"
          
          # Validate JSON-RPC success
          echo "$RESPONSE" | jq -e '.result' >/dev/null
          
          echo "✅ JSON-RPC health check passed"

      - name: Debug IPFS endpoints
        if: env.IPFS_GATEWAY != ''
        shell: bash
        run: |
          set -uo pipefail
          echo "📦 IPFS Gateway: $IPFS_GATEWAY"
          echo "🔐 IPFS Auth Gateway: $IPFS_AUTH_GATEWAY"

          for label_url in "IPFS_GW:$IPFS_GATEWAY" "IPFS_AUTH:$IPFS_AUTH_GATEWAY"; do
            LABEL="${label_url%%:*}"
            URL="${label_url#*:}"
            [ -z "$URL" ] && continue
            STATUS=$(curl -sS --max-time 10 -o /dev/null -w '%{http_code}' "$URL" || echo "000")
            echo "$LABEL → HTTP $STATUS"
            if [ "$STATUS" = "000" ]; then
              echo "::warning::$LABEL tunnel unreachable"
            fi
          done

      - uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/cargo-ndk
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-ndk-${{ hashFiles('packages/ew_zk_prover/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-ndk-

      - name: Install cargo-ndk
        run: command -v cargo-ndk || cargo install cargo-ndk

      - name: Install flutter wrapper
        run: ./scripts/install_flutter_wrapper.sh

      - name: Setup Android SDK and accept licences
        uses: android-actions/setup-android@v3

      - name: List android images
        run: sdkmanager --list | grep system-images

      - name: Get dependencies (i.e., melos)
        run: .flutter/bin/dart pub get

      - name: Melos Bootstrap
        run: .flutter/bin/dart run melos bootstrap

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: AVD cache
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
            /usr/local/lib/android/sdk/system-images
          key: avd-v2-${{ env.API_LEVEL }}-${{ env.DEVICE }}

      - name: "Create AVD and generate a clean snapshot for caching"
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          profile: ${{ env.DEVICE }}
          force-avd-creation: false
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Start Android emulator
        id: start-emulator
        timeout-minutes: 10
        run: ./scripts/android_start_emulator.sh

      - name: Start screen recording
        if: env.RECORD_VIDEO == 'true' && steps.start-emulator.conclusion == 'success'
        run: |
          # Android screenrecord has a 180s hard limit per recording.
          # Chain segments to cover long-running tests.
          (
            for i in $(seq 1 20); do
              adb shell screenrecord --time-limit 180 "/sdcard/recording_part${i}.mp4" || break
            done
          ) &
          echo $! > /tmp/recording_pid.txt

      - name: Main integration test
        if: ${{ !cancelled() && steps.start-emulator.conclusion == 'success' }}
        timeout-minutes: 30
        working-directory: ./app
        run: |
          ../.flutter/bin/flutter drive \
            --no-enable-impeller \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_test.dart \
            --flavor dev \
            --dart-define=WS_ENDPOINT="$WS_ENDPOINT" \
            --dart-define=locales=en

      - name: QR payment story
        if: ${{ !cancelled() && steps.start-emulator.conclusion == 'success' }}
        timeout-minutes: 10
        run: |
          adb shell pm clear org.encointer.wallet || echo "Could not clear app data"
          ./scripts/run_qr_payment_story.sh

      - name: Bazaar business story
        if: ${{ !cancelled() && steps.start-emulator.conclusion == 'success' && env.IPFS_GATEWAY != '' && env.IPFS_AUTH_GATEWAY != '' }}
        timeout-minutes: 10
        run: |
          adb shell pm clear org.encointer.wallet || echo "Could not clear app data"
          ./scripts/run_bazaar_business_story.sh

      - name: Stop recording and collect artifacts
        if: always()
        run: |
          if [ -f /tmp/recording_pid.txt ]; then
            kill "$(cat /tmp/recording_pid.txt)" 2>/dev/null || true
            sleep 3
            mkdir -p "$ARTIFACT_PATH"
            for i in $(seq 1 20); do
              adb pull "/sdcard/recording_part${i}.mp4" "$ARTIFACT_PATH" 2>/dev/null || true
            done
            # Stitch video segments into a single recording
            ls "$ARTIFACT_PATH"/recording_part*.mp4 2>/dev/null | sort -V | \
              sed 's/^/file /' > "$ARTIFACT_PATH/concat.txt"
            if [ -s "$ARTIFACT_PATH/concat.txt" ]; then
              ffmpeg -f concat -safe 0 -i "$ARTIFACT_PATH/concat.txt" \
                -c copy "$ARTIFACT_PATH/recording.mp4" 2>/dev/null && \
                rm -f "$ARTIFACT_PATH"/recording_part*.mp4 "$ARTIFACT_PATH/concat.txt"
            fi
          fi
          mkdir -p "$ARTIFACT_PATH"
          cp -r "$ARTIFACT_PATH/test"/* "$ARTIFACT_PATH" 2>/dev/null || echo "no screenshots found"
          rm -r "$ARTIFACT_PATH/test" 2>/dev/null || true

      - name: Terminate emulator
        if: always()
        run: adb emu kill || true

      - name: "Upload screenshots"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DEVICE }}-api${{ env.API_LEVEL }}-screenshots
          path: ${{ env.ARTIFACT_PATH }}
